# ==================== PROXY GROUPS ====================

proxy-groups:
  # Gemini AI / YouTube — select, управляется latency-monitor.sh
  - name: "🤖 GEMINI"
    type: select
    use:
      - PrivateVPN
      - ARZA
    filter: "^(?!.*(Россия|Russia|Kazakhstan|Казахстан|Armenia|Армения|Torrent|torrent|Истекает|Купить|WARP|AWG|⏳|Германия|Germany|Эстония|Латвия|Latvia)).*$"

  # PrivateVPN — auto best
  - name: "PrvtVPN"
    type: url-test
    use:
      - PrivateVPN
    filter: "^(?!.*(Russia|Россия|Kazakhstan|Казахстан|Armenia|Армения|Torrent|torrent|Истекает|Купить|WARP|AWG)).*$"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 300
    tolerance: 50

  # ARZA — auto best
  - name: "ARZA"
    type: url-test
    use:
      - ARZA
    filter: "^(?!.*(Armenia|Армения|Истекает|Купить|Torrent|torrent)).*$"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 300
    tolerance: 50

  # Основной прокси
  - name: "🎯 MAIN-PROXY"
    type: url-test
    use:
      - PrivateVPN
      - ARZA
    filter: "^(?!.*(Россия|Russia|Kazakhstan|Казахстан|Armenia|Армения|Torrent|torrent|Истекает|Купить|WARP|AWG|⏳)).*$"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 300
    tolerance: 50

  # Telegram — AWG + PrvtVPN
  - name: "✈️ TELEGRAM"
    type: url-test
    proxies:
      - "PrvtVPN"
      - "AWG 1.5 (1 Вариант)"
      - "AWG 1.5 (2 Вариант)"
      - "AWG 1.5 (3 Вариант)"
    url: "https://api.telegram.org/"
    interval: 60
    tolerance: 100

  # Discord — AWG
  - name: "🎙️ DISCORD"
    type: url-test
    proxies:
      - "AWG 1.5 (1 Вариант)"
      - "AWG 1.5 (2 Вариант)"
      - "AWG 1.5 (3 Вариант)"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 120

# ==================== RULES ====================

rules:
  # --- REJECT ---
  - DOMAIN-SUFFIX,wpad,REJECT
  - DOMAIN-KEYWORD,wpad,REJECT

  # --- DIRECT: LAN / infrastructure ---
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - DOMAIN-SUFFIX,local,DIRECT
  - DST-PORT,123,DIRECT

  # --- DIRECT: Media / Torrents ---
  - RULE-SET,direct-media,DIRECT
  - RULE-SET,anime-trackers,DIRECT
  - PROCESS-NAME,lampa.exe,DIRECT,no-resolve
  - PROCESS-NAME,lampac.exe,DIRECT,no-resolve
  - AND,((NETWORK,TCP),(DST-PORT,6881-6999)),DIRECT
  - AND,((NETWORK,TCP),(DST-PORT,51413)),DIRECT
  - AND,((NETWORK,UDP),(DST-PORT,6881-6999)),DIRECT
  - AND,((NETWORK,UDP),(DST-PORT,51413)),DIRECT

  # --- GEMINI: Google / YouTube ---
  - RULE-SET,google-gemini,🤖 GEMINI
  - GEOIP,GOOGLE,🤖 GEMINI,no-resolve

  # --- TELEGRAM ---
  - RULE-SET,telegram,✈️ TELEGRAM
  - RULE-SET,telegram-extra,✈️ TELEGRAM

  # --- DISCORD ---
  - RULE-SET,discord-rules,🎙️ DISCORD

  # --- MAIN-PROXY: blocked services ---
  - RULE-SET,github-copilot,🎯 MAIN-PROXY
  - RULE-SET,openai,🎯 MAIN-PROXY
  - RULE-SET,twitter,🎯 MAIN-PROXY
  - RULE-SET,instagram,🎯 MAIN-PROXY
  - RULE-SET,facebook,🎯 MAIN-PROXY
  - RULE-SET,whatsapp,🎯 MAIN-PROXY
  - RULE-SET,notion,🎯 MAIN-PROXY
  - RULE-SET,microsoft,🎯 MAIN-PROXY
  - RULE-SET,oracle,🎯 MAIN-PROXY
  - RULE-SET,tools,🎯 MAIN-PROXY
  - RULE-SET,proxy-misc,🎯 MAIN-PROXY
  - RULE-SET,ru-blocked,🎯 MAIN-PROXY

  # --- Catch-all ---
  - MATCH,DIRECT
