# config-SSCLASH.yaml — restructured
# Обновление GeoIP
mmdb-path: /opt/clash/geoip.db
geodata-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/latest/download/geoip.db"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/latest/download/geosite.db"

# Основные настройки
mixed-port: 7890
socks-port: 7891
redir-port: 7892
port: 7890
allow-lan: true
bind-address: '0.0.0.0'
mode: rule
tproxy-port: 7894
authentication:
  - "root:4bu-j6m-7Bf-5JK"
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090
secret: "181af8b1ce1d980cd46c47f6656878b2"
external-ui: /opt/clash/ui/xd
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip"

# DPI обход
tcp-fast-open: true
udp-fragment: false
enable-process: false
routing-mark: 2

# Профиль
profile:
  store-selected: true
  tracing: true

# Keep-alive
keep-alive-idle: 15
keep-alive-interval: 15

# DNS
dns:
  enable: true
  listen: '127.0.0.1:1053'
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  fake-ip-filter-mode: blacklist
  prefer-h3: false
  respect-rules: false
  use-hosts: true
  use-system-hosts: false
  ipv6: false

  default-nameserver:
    - '1.1.1.1'
    - '8.8.8.8'
    - '9.9.9.9'

  nameserver:
    - 'https://dns.nextdns.io/cffd45'
    - 'https://dns.google/dns-query'
    - 'https://dns.quad9.net/dns-query'

  proxy-server-nameserver:
    - 'https://dns.google/dns-query'
    - 'https://dns.quad9.net/dns-query'

  direct-nameserver-follow-policy: false
  direct-nameserver:
    - '1.1.1.1'
    - '8.8.8.8'
    - '9.9.9.9'

  fallback:
    - 'tls://8.8.8.8'
    - 'tls://9.9.9.9'

  fallback-filter:
    geoip: true
    geoip-code: 'RU'
    ipcidr:
      - '240.0.0.0/4'
      - '0.0.0.0/32'
    domain:
      - '+google.com'
      - '+facebook.com'
      - '+youtube.com'

  nameserver-policy:
    +.generativelanguage.googleapis.com:
      - 'https://dns.google/dns-query'
    +.google.com:
      - 'https://dns.google/dns-query'
    +.ru:
      - '1.1.1.1'
      - '8.8.8.8'
    +.su:
      - '1.1.1.1'
    +.yandex.ru:
      - '1.1.1.1'
    +.рф:
      - '1.1.1.1'

  fake-ip-filter:
    # DNS providers
    - 'google-public-dns-a.google.com'
    - 'google-public-dns-b.google.com'
    - 'dns.google'
    - 'dns.quad9.net'
    - 'dnscheck.adguard.com'
    - 'dns.adguard.com'
    - '+.adguard.com'
    # RU TLDs
    - '+.ru'
    - '+.рф'
    - '+.su'
    # Banks / shops
    - '+.otpbank.ru'
    - '+.ozon.ru'
    - '+.finance.ozon.ru'
    - '+.wildberries.ru'
    - '+.wb.ru'
    - '+.ya.ru'
    - '+.yandex.ru'
    - '+.yabank.yandex.ru'
    - '+.t2.ru'
    - '+.tele2.ru'
    - '+.mts.ru'
    - '+.lk.mts.ru'
    - '+.mtsbank.ru'
    # Router firmware
    - '+.openwrt.org'
    - '+.downloads.openwrt.org'
    - '+.gl-inet.com'
    - '+.fw.gl-inet.com'
    # GitHub
    - '+.github.com'
    - '+.github.io'
    - '+.githubusercontent.com'
    - '+.adaway.org'
    # LAN / mDNS
    - '*.local'
    - '*.lan'
    - '*.home.arpa'
    - '*.localdomain'
    - '*.router'
    - '*.in-addr.arpa'
    - '*.ip6.arpa'
    # Windows connectivity
    - 'msftconnecttest.com'
    - '*.msftconnecttest.com'
    - 'msftncsi.com'
    - '*.msftncsi.com'
    - 'dns.msftncsi.com'
    - 'www.msftconnecttest.com'
    # Captive portals
    - 'connectivitycheck.gstatic.com'
    - 'clients3.google.com'
    - 'clients4.google.com'
    - 'captive.apple.com'
    - 'netcts.cdn-apple.com'
    - 'apple.com'
    - '*.apple.com'
    - '*.gstatic.com'
    # Routers
    - 'miwifi.com'
    - '*.miwifi.com'
    - 'router.asus.com'
    - '*.router.asus.com'
    - 'tplinkwifi.net'
    - '*.tplinkwifi.net'
    - 'linksyssmartwifi.com'
    - '*.linksyssmartwifi.com'
    - 'my.router'
    - 'my.keenetic.net'
    - 'keenetic.net'
    - '*.keenetic.net'
    # NTP
    - 'pool.ntp.org'
    - '*.pool.ntp.org'
    - 'time.google.com'
    - 'time.cloudflare.com'
    # Proxy providers
    - '+.flowlayer.app'
    - '+.arza.top'
    - '+.accessbyme.com'
    # Torrent / media
    - '+.jackett'
    - '+.flaresolverr'
    - '+.tracker'
    - 'rutracker.org'
    - '*.xxee.ru'
    - '+.torrentonline.cc'
    - '+.080609.xyz'

# Sniffer
sniffer:
  enable: true
  sniff-tls-sni: true
  force-dns-mapping: false
  parse-pure-ip: false

  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
      sniff-request: true
    TLS:
      ports: [443, 8443]
      override-destination: true

  skip-domain:
    - "+.github.com"
    - "+.githubusercontent.com"
    - "+.githubcopilot.com"
    - "+.visualstudio.com"
    - "+.vsassets.io"
    - "+.microsoftonline.com"
    - "+.live.com"
    - "+.office.com"
    - "+.azure.com"
    - "+.windows.net"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.lan"
    - "+.local"
    - "+.apple.com"
    - "*.miwifi.com"
    - "yandex.ru"
    - "*.yandex.ru"
    - "rutube.ru"
    - "*.rutube.ru"

